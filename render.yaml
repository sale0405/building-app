services:
  - type: web
    name: building-app-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: docker/Dockerfile.backend
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: building-app-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://boisterous-pithivier-1cd25b.netlify.app
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: STORAGE_PATH
        value: /app/uploads

databases:
  - name: building-app-db
    plan: free
    databaseName: building_app
    user: building
